debug: false

server:
  port: 8080

spring:
  application:
    name: kaoshi-backend
  datasource:
    url: ${KAOSHI_DB_URL:jdbc:mysql://localhost:3306/kaoshi?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${KAOSHI_DB_USERNAME:root}
    password: ${KAOSHI_DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${KAOSHI_REDIS_HOST:localhost}
      port: ${KAOSHI_REDIS_PORT:6379}
  flyway:
    enabled: true
    locations: classpath:db/migration
    sql-migration-prefix: MIGRATION
  jackson:
    time-zone: Asia/Shanghai
  mail:
    host: ${KAOSHI_MAIL_HOST:localhost}
    port: ${KAOSHI_MAIL_PORT:25}
    username: ${KAOSHI_MAIL_USERNAME:}
    password: ${KAOSHI_MAIL_PASSWORD:}
    protocol: ${KAOSHI_MAIL_PROTOCOL:smtp}
    properties:
      mail:
        smtp:
          auth: ${KAOSHI_MAIL_AUTH:false}
          ssl:
            enable: ${KAOSHI_MAIL_SSL_ENABLED:false}
          starttls:
            enable: ${KAOSHI_MAIL_STARTTLS_ENABLED:false}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer: ERROR

kaoshi:
  jwt:
    issuer: kaoshi
    secret: ${KAOSHI_JWT_SECRET:kaoshi-local-development-secret-key-must-be-at-least-32-bytes}
    access-token-minutes: 120
  mail:
    enabled: ${KAOSHI_MAIL_ENABLED:false}
    delivery-mode: ${KAOSHI_MAIL_DELIVERY_MODE:SMTP}
    from: ${KAOSHI_MAIL_FROM:}
    expose-debug-code: ${KAOSHI_MAIL_EXPOSE_DEBUG_CODE:false}

