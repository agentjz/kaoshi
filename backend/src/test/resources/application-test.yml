debug: false

spring:
  datasource:
    url: jdbc:h2:mem:kaoshi;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  data:
    redis:
      host: localhost
      port: 6379
  flyway:
    enabled: true
    locations: classpath:db/migration
    sql-migration-prefix: MIGRATION

kaoshi:
  jwt:
    issuer: kaoshi-test
    secret: kaoshi-test-secret-key-must-be-at-least-32-bytes
    access-token-minutes: 60

logging:
  level:
    root: INFO
    org.springframework: WARN
    org.springframework.boot.autoconfigure: ERROR
    org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer: ERROR

