name: kaoshi

services:
  mysql:
    image: mysql:8.4
    container_name: kaoshi-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: kaoshi
      TZ: Asia/Shanghai
    ports:
      - "13306:3306"
    volumes:
      - kaoshi_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: kaoshi-redis
    ports:
      - "16379:6379"
    volumes:
      - kaoshi_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: kaoshi-backend
    environment:
      KAOSHI_DB_URL: jdbc:mysql://mysql:3306/kaoshi?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      KAOSHI_DB_USERNAME: root
      KAOSHI_DB_PASSWORD: password
      KAOSHI_REDIS_HOST: redis
      KAOSHI_REDIS_PORT: 6379
      KAOSHI_JWT_SECRET: kaoshi-compose-secret-key-must-be-at-least-32-bytes
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: kaoshi-frontend
    ports:
      - "4173:4173"
    depends_on:
      - backend

volumes:
  kaoshi_mysql:
    name: kaoshi_mysql
  kaoshi_redis:
    name: kaoshi_redis
